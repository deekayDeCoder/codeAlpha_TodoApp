<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="../style.css" />
    <script src="../script.js" type="module" defer></script>
    <script src="../Scripts/editTask.js" type="module" defer></script>
  </head>

    <header class="header">
      <h1 class="brand-name"><a href="./homePage.html"> Deekay's Todo</a></h1>

            />
          </svg>
        </button>
        <nav class="nav-controls">
          <a href="./homePage.html" class="nav-btn home">
            <span>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                fill="currentColor"
                class="bi bi-house"
                viewBox="0 0 16 16"
              >

                />
              </svg>
            </span>
            Home
          </a>
          <a href="./settings.html" class="nav-btn settings">
            <span>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                fill="currentColor"
                class="bi bi-gear"
                viewBox="0 0 16 16"
              >
                <path
                  d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"

                <path

              </svg>
            </span>
            Settings
          </a>
        </nav>
      </div>
    </header>
    <main class="main">
      <form action="" method="post" class="task-form">
        <h1 class="form-title">
          <span>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              fill="currentColor"
              class="bi bi-ui-checks"
              viewBox="0 0 16 16"
            >
              <path
                d="M7 2.5a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-7a.5.5 0 0 1-.5-.5v-1zM2 1a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2H2zm0 8a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2v-2a2 2 0 0 0-2-2H2zm.854-3.646a.5.5 0 0 1-.708 0l-1-1a.5.5 0 1 1 .708-.708l.646.647 1.646-1.647a.5.5 0 1 1 .708.708l-2 2zm0 8a.5.5 0 0 1-.708 0l-1-1a.5.5 0 0 1 .708-.708l.646.647 1.646-1.647a.5.5 0 0 1 .708.708l-2 2zM7 10.5a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-7a.5.5 0 0 1-.5-.5v-1zm0-5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5zm0 8a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5z"
              />
            </svg>
          </span>
          Task Editor
        </h1>
        <label for="task-name">Task Name</label>
        <input type="text" name="task-name" id="task-name" class="task-name" />
        <label for="task-description">Task Description</label>
        <input
          type="text"
          name="task-description"
          id="task-description"
          class="task-description"
        />
        <label for="task-time">Task Time</label>
        <input
          type="time"
          name="task-time"
          id="task-time"
          class="task-time"
          placeholder="00:00 am"
        />
        <div class="error-display-panel hide"></div>
        <input type="submit" class="edit-task-btn" value="Edit Task" />
      </form>
    </main>
  </body>
</html>
